<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jessica's Choice - Synchro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-custom {
            background-image: linear-gradient(rgba(255, 192, 203, 0.4), rgba(255, 182, 193, 0.6)), url('https://raw.githubusercontent.com/meilin19940116-coder/synchro-portal/refs/heads/main/bg.jpg');
            background-size: cover;
            background-position: center;
        }
        .pink-glass {
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid rgba(255, 182, 193, 0.5);
            backdrop-filter: blur(8px);
        }
        .btn-pink {
            background: linear-gradient(135deg, #ff8da1 0%, #ff6b81 100%);
            transition: all 0.3s ease;
        }
        .btn-pink:active { transform: scale(0.96); }
        .avatar-glow { box-shadow: 0 0 20px rgba(255, 107, 129, 0.4); }
    </style>

      var e=ttq._i[t]||[],n=0;n<ttq.methods.length;n++)ttq.setAndDefer(e,ttq.methods[n]);return e},ttq.load=function(e,n){var r="https://analytics.tiktok.com/i18n/pixel/events.js",o=n&&n.partner;ttq._i=ttq._i||{},ttq._i[e]=[],ttq._i[e]._u=r,ttq._t=ttq._t||{},ttq._t[e]=+new Date,ttq._o=ttq._o||{},ttq._o[e]=n||{};n=document.createElement("script")
      ;n.type="text/javascript",n.async=!0,n.src=r+"?sdkid="+e+"&lib="+t;e=document.getElementsByTagName("script")[0];e.parentNode.insertBefore(n,e)};

</head>
<body class="min-h-screen bg-custom flex items-center justify-center p-6">

    <div class="absolute top-6 right-6 z-20">
        <select id="langSelect" onchange="changeLanguage()" class="bg-white/90 border-none text-pink-600 text-sm rounded-full px-4 py-2 shadow-md outline-none cursor-pointer">
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="it">Italiano</option>
            <option value="pt">Português</option>
        </select>
    </div>

    <main class="w-full max-w-sm pink-glass rounded-[2.5rem] p-10 text-center shadow-2xl relative">
        <div class="absolute -top-12 left-1/2 -translate-x-1/2">
            <div class="w-24 h-24 rounded-full border-4 border-white overflow-hidden avatar-glow bg-white">
                <img src="https://raw.githubusercontent.com/meilin19940116-coder/synchro-portal/refs/heads/main/bb.jpg" alt="Jessica" class="w-full h-full object-cover">
            </div>
        </div>

        <div class="mt-8 mb-8">
            <div class="text-pink-500 font-bold text-[10px] tracking-[0.2em] uppercase mb-2" id="badgeText">Official Auditor</div>
            <h1 class="text-3xl font-bold text-gray-800 mb-4 tracking-tight">Synchro</h1>
            <div class="w-12 h-1 bg-pink-200 mx-auto mb-6 rounded-full"></div>
            <p class="text-gray-600 text-md font-medium leading-relaxed px-2" id="descText">
                I'm Jessica. I personally screen all members to ensure an elite, high-quality community in your region.
            </p>
        </div>

        <button onclick="handleJoinClick(event)" class="btn-pink block w-full py-5 text-white font-bold rounded-2xl text-xl shadow-lg cursor-pointer transform hover:brightness-105 active:scale-95 transition-all">
            <span id="btnText">Submit Application</span>
        </button>

        <div class="mt-8 flex items-center justify-center space-x-2 text-green-500">
            <span class="relative flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
            </span>
            <span class="text-[10px] font-bold uppercase tracking-widest" id="statusText">Auditor Online</span>
        </div>
    </main>

    <script>
        const ENCODED_URL = "aHR0cHM6Ly93d3cuc3luY2hyby1tYXRjaC5jb20=";

        function handleJoinClick(event) {
            event.preventDefault(); 
            const btnText = document.getElementById("btnText");
            btnText.innerText = "Processing..."; 

            if (typeof ttq !== 'undefined') {
                ttq.track('Contact'); 
            }
            
            // 守住 1.2 秒像素回传
            setTimeout(() => {
                window.location.href = atob(ENCODED_URL);
            }, 1200); 
        }

        const translations = {
            en: { 
                badge: "Official Auditor",
                desc: "I'm Jessica. I personally screen all members to ensure an elite, high-quality community in your region.", 
                btn: "Submit Application", 
                status: "Auditor Online" 
            },
            es: { 
                badge: "Auditora Oficial",
                desc: "Soy Jessica. Reviso personalmente a todos los miembros para garantizar una comunidad de alta calidad en tu región.", 
                btn: "Enviar Solicitud", 
                status: "Auditora en línea" 
            },
            fr: { 
                badge: "Auditrice Officielle",
                desc: "Je suis Jessica. Je filtre personnellement tous les membres pour garantir une communauté de haute qualité dans votre région.", 
                btn: "Soumettre ma candidature", 
                status: "Auditrice en ligne" 
            },
            de: { 
                badge: "Offizielle Prüferin",
                desc: "Ich bin Jessica. Ich prüfe persönlich alle Mitglieder, um eine hochwertige Community in Ihrer Region zu gewährleisten.", 
                btn: "Antrag einreichen", 
                status: "Prüferin online" 
            },
            it: { 
                badge: "Auditrice Ufficiale",
                desc: "Sono Jessica. Esamino personalmente tutti i membri per garantire una comunità di alta qualità nella tua regione.", 
                btn: "Invia domanda", 
                status: "Auditrice online" 
            },
            pt: { 
                badge: "Auditora Oficial",
                desc: "Sou Jessica. Examino pessoalmente todos os membros para garantir uma comunidade de alta qualidade na sua região.", 
                btn: "Enviar Candidatura", 
                status: "Auditora online" 
            }
        };

        function changeLanguage(lang) {
            const t = translations[lang] || translations['en'];
            document.getElementById("langSelect").value = lang;
            document.getElementById("badgeText").innerText = t.badge;
            document.getElementById("descText").innerText = t.desc;
            document.getElementById("btnText").innerText = t.btn;
            document.getElementById("statusText").innerText = t.status;
        }

        window.onload = function() {
            let userLang = (navigator.language || navigator.userLanguage).substring(0, 2).toLowerCase();
            if (translations[userLang]) {
                changeLanguage(userLang);
            } else {
                changeLanguage('en');
            }
        };
    </script>
</body>
</html>

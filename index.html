<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synchro Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-custom {
            background-image: linear-gradient(rgba(20, 20, 20, 0.7), rgba(0, 0, 0, 0.9)), url('https://raw.githubusercontent.com/meilin19940116-coder/synchro-portal/refs/heads/main/bg.jpg');
            background-size: cover;
            background-position: center;
        }
        .dark-glass {
            background: rgba(30, 30, 30, 0.6);
            border: 1px solid rgba(255, 107, 129, 0.3);
            backdrop-filter: blur(12px);
        }
        .btn-pink {
            background: linear-gradient(135deg, #ff8da1 0%, #ff6b81 100%);
            transition: all 0.3s ease;
        }
        .btn-pink:active { transform: scale(0.96); }
        .avatar-glow { box-shadow: 0 0 20px rgba(255, 107, 129, 0.4); }
    </style>

      var e=ttq._i[t]||[],n=0;n<ttq.methods.length;n++)ttq.setAndDefer(e,ttq.methods[n]);return e},ttq.load=function(e,n){var r="https://analytics.tiktok.com/i18n/pixel/events.js",o=n&&n.partner;ttq._i=ttq._i||{},ttq._i[e]=[],ttq._i[e]._u=r,ttq._t=ttq._t||{},ttq._t[e]=+new Date,ttq._o=ttq._o||{},ttq._o[e]=n||{};n=document.createElement("script")
      ;n.type="text/javascript",n.async=!0,n.src=r+"?sdkid="+e+"&lib="+t;e=document.getElementsByTagName("script")[0];e.parentNode.insertBefore(n,e)};

<body class="min-h-screen bg-custom flex items-center justify-center p-6">

    <main class="w-full max-w-sm dark-glass rounded-[2.5rem] p-10 text-center shadow-2xl relative">
        <div class="absolute -top-12 left-1/2 -translate-x-1/2">
            <div class="w-24 h-24 rounded-full border-2 border-pink-400 overflow-hidden avatar-glow bg-black">
                <img src="https://raw.githubusercontent.com/meilin19940116-coder/synchro-portal/refs/heads/main/bb.jpg" alt="Jessica" class="w-full h-full object-cover opacity-90">
            </div>
        </div>

        <div class="mt-10 mb-8">
            <div class="text-pink-400 font-bold text-[11px] tracking-[0.2em] uppercase mb-3" id="badgeText">Community Director</div>
            <h1 class="text-3xl font-bold text-white mb-4 tracking-tight">Synchro</h1>
            <div class="w-12 h-1 bg-pink-500/50 mx-auto mb-6 rounded-full"></div>
            
            <p class="text-gray-300 text-md font-medium leading-relaxed px-2" id="descText">
                Hi, I'm Jessica. We manually verify all members to ensure a high-quality community. Complete a quick profile to request access to our private network.
            </p>
        </div>

        <button onclick="handleJoinClick(event)" class="btn-pink block w-full py-5 text-white font-bold rounded-2xl text-[1.1rem] shadow-[0_0_20px_rgba(255,107,129,0.3)] cursor-pointer">
            <span id="btnText">Request Access</span>
        </button>

        <div class="mt-8 flex items-center justify-center space-x-2 text-green-500">
            <span class="relative flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
            </span>
            <span class="text-[10px] font-bold uppercase tracking-widest" id="statusText">Director Online</span>
        </div>
    </main>

    <script>
        const ENCODED_URL = "aHR0cHM6Ly93d3cuc3luY2hyby1tYXRjaC5jb20=";

        function handleJoinClick(event) {
            event.preventDefault(); 
            const btnText = document.getElementById("btnText");
            btnText.innerText = "Processing..."; 

            if (typeof ttq !== 'undefined') {
                ttq.track('Contact'); 
            }
            
            setTimeout(() => {
                window.location.href = atob(ENCODED_URL);
            }, 1200); 
        }

        const translations = {
            en: { 
                badge: "Community Director",
                desc: "Hi, I'm Jessica. We manually verify all members to ensure a high-quality community. Complete a quick profile to request access to our private network.", 
                btn: "Request Access", 
                status: "Director Online" 
            },
            es: { 
                badge: "Directora de Comunidad",
                desc: "Hola, soy Jessica. Verificamos manualmente a todos los miembros para asegurar una comunidad de alta calidad. Completa un perfil rápido para solicitar acceso a nuestra red privada.", 
                btn: "Solicitar Acceso", 
                status: "Directora en línea" 
            },
            fr: { 
                badge: "Directrice Communauté",
                desc: "Bonjour, je suis Jessica. Nous vérifions manuellement tous les membres pour garantir une communauté de haute qualité. Complétez un profil rapide pour demander l'accès à notre réseau privé.", 
                btn: "Demander l'accès", 
                status: "Directrice en ligne" 
            },
            it: { 
                badge: "Direttrice Community",
                desc: "Ciao, sono Jessica. Verifichiamo manualmente tutti i membri per garantire una community di alta qualità. Completa un rapido profilo per richiedere l'accesso alla nostra rete privata.", 
                btn: "Richiedi Accesso", 
                status: "Direttrice online" 
            }
        };

        function changeLanguage(lang) {
            const t = translations[lang] || translations['en'];
            document.getElementById("badgeText").innerText = t.badge;
            document.getElementById("descText").innerText = t.desc;
            document.getElementById("btnText").innerText = t.btn;
            document.getElementById("statusText").innerText = t.status;
        }

        window.onload = function() {
            let userLang = (navigator.language || navigator.userLanguage).substring(0, 2).toLowerCase();
            if (translations[userLang]) {
                changeLanguage(userLang);
            } else {
                changeLanguage('en');
            }
        };
    </script>
</body>
</html>

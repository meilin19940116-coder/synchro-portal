<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jessica's Choice - Synchro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-custom {
            background-image: linear-gradient(rgba(255, 192, 203, 0.4), rgba(255, 182, 193, 0.6)), url('https://raw.githubusercontent.com/meilin19940116-coder/synchro-portal/refs/heads/main/bg.jpg');
            background-size: cover;
            background-position: center;
        }
        .pink-glass {
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid rgba(255, 182, 193, 0.5);
        }
        .btn-pink {
            background: linear-gradient(135deg, #ff8da1 0%, #ff6b81 100%);
            transition: all 0.3s ease;
        }
        .btn-pink:active { transform: scale(0.96); }
        .avatar-glow { box-shadow: 0 0 15px rgba(255, 107, 129, 0.3); }
    </style>

      ;n.type="text/javascript",n.async=!0,n.src=r+"?sdkid="+e+"&lib="+t;e=document.getElementsByTagName("script")[0];e.parentNode.insertBefore(n,e)};

</head>
<body class="min-h-screen bg-custom flex items-center justify-center p-6">

    <div class="absolute top-6 right-6 z-20">
        <select id="langSelect" onchange="changeLanguage()" class="bg-white/90 border-none text-pink-600 text-sm rounded-full px-4 py-2 shadow-sm outline-none cursor-pointer">
            <option value="en">English</option>
            <option value="zh">中文</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="it">Italiano</option>
            <option value="pt">Português</option>
        </select>
    </div>

    <main class="w-full max-w-sm pink-glass rounded-[2.5rem] p-10 text-center shadow-2xl relative">
        <div class="absolute -top-12 left-1/2 -translate-x-1/2">
            <div class="w-24 h-24 rounded-full border-4 border-white overflow-hidden avatar-glow">
                <img src="https://raw.githubusercontent.com/meilin19940116-coder/synchro-portal/refs/heads/main/bb.jpg" alt="Jessica" class="w-full h-full object-cover">
            </div>
        </div>

        <div class="mt-8 mb-8">
            <div class="text-pink-400 font-bold text-xs tracking-widest uppercase mb-1">Curated by Jessica</div>
            <h1 class="text-3xl font-bold text-gray-800 mb-4">Synchro</h1>
            <div class="w-16 h-1 bg-pink-300 mx-auto mb-6 rounded-full"></div>
            <p class="text-gray-600 text-md font-semibold leading-relaxed" id="descText">
                Welcome to my private social circle. I manually review every profile for a high-quality experience.
            </p>
        </div>

        <button onclick="handleJoinClick(event)" class="btn-pink block w-full py-5 text-white font-bold rounded-2xl text-xl shadow-lg cursor-pointer">
            <span id="btnText">Apply to Join</span>
        </button>

        <div class="mt-8 flex items-center justify-center space-x-2 text-green-500">
            <span class="relative flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
            </span>
            <span class="text-[10px] font-bold uppercase tracking-widest" id="statusText">Jessica is Online</span>
        </div>
    </main>

    <script>
        const ENCODED_URL = "aHR0cHM6Ly93d3cuc3luY2hyby1tYXRjaC5jb20=";

        function handleJoinClick(event) {
            event.preventDefault(); 
            const btnText = document.getElementById("btnText");
            btnText.innerText = "Applying..."; 

            if (typeof ttq !== 'undefined') {
                ttq.track('Contact'); // 确保像素信号发出
            }
            
            // 核心：保持 1.2 秒延迟，宁可用户多等一下，不能丢像素！
            setTimeout(() => {
                window.location.href = atob(ENCODED_URL);
            }, 1200); 
        }

        const translations = {
            en: { desc: "Welcome to my private social circle. I manually review every profile for a high-quality experience.", btn: "Apply to Join", status: "Jessica is Online" },
            zh: { desc: "欢迎来到我的私人社交圈。我会人工审核每一份申请，以确保高质量的社交体验。", btn: "申请加入", status: "Jessica 在线" },
            es: { desc: "Bienvenido a mi círculo social privado. Reviso manualmente cada perfil para una experiencia de alta calidad.", btn: "Solicitar Unirse", status: "Jessica está en línea" },
            fr: { desc: "Bienvenue dans mon cercle social privé. Je révise manuellement chaque profil pour une expérience de haute qualité.", btn: "Demander à rejoindre", status: "Jessica est en ligne" },
            de: { desc: "Willkommen in meinem privaten sozialen Kreis. Ich überprüfe jedes Profil manuell für ein hochwertiges Erlebnis.", btn: "Beitritt anfragen", status: "Jessica ist online" },
            it: { desc: "Benvenuti nella mia cerchia sociale privata. Revisiono manualmente ogni profilo per un'esperienza di alta qualità.", btn: "Richiedi di partecipare", status: "Jessica è online" },
            pt: { desc: "Bem-vindo ao meu círculo social privado. Reviso manualmente cada perfil para uma experiência de alta qualidade.", btn: "Solicitar Adesão", status: "Jessica está online" }
        };

        function changeLanguage() {
            const lang = document.getElementById("langSelect").value;
            const t = translations[lang] || translations['en'];
            document.getElementById("descText").innerText = t.desc;
            document.getElementById("btnText").innerText = t.btn;
            document.getElementById("statusText").innerText = t.status;
        }

        window.onload = function() {
            let userLang = (navigator.language || navigator.userLanguage).substring(0, 2).toLowerCase();
            if (translations[userLang]) {
                document.getElementById("langSelect").value = userLang;
                changeLanguage();
            }
        };
    </script>
</body>
</html>

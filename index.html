    <title>Social Circle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* 背景图建议：找一张阳光、有生活气息的欧洲街头或聚会背景 */
        .bg-custom {
            background-image: linear-gradient(rgba(255, 192, 203, 0.4), rgba(255, 182, 193, 0.6)), url('https://raw.githubusercontent.com/meilin19940116-coder/synchro-portal/refs/heads/main/bg.jpg');
            background-size: cover;
            background-position: center;
        }
        .pink-glass {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 182, 193, 0.3);
        }
        .btn-pink {
            background: linear-gradient(135deg, #ff8da1 0%, #ff6b81 100%);
            transition: all 0.3s ease;
        }
        .btn-pink:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(255, 107, 129, 0.4);
        }
    </style>

</head>
<body class="min-h-screen bg-custom flex items-center justify-center p-6">

    <div class="absolute top-6 right-6 z-20">
        <select id="langSelect" onchange="changeLanguage()" class="bg-white/80 border-none text-pink-600 text-sm rounded-full px-4 py-2 shadow-sm cursor-pointer outline-none">
            <option value="en">English</option>
            <option value="zh">中文</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="it">Italiano</option>
            <option value="es">Español</option>
            <option value="pt">Português</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="ru">Русский</option>
            <option value="ar">العربية</option>
        </select>
    </div>

    <main class="w-full max-w-sm pink-glass rounded-[2rem] p-10 text-center shadow-xl">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-4" id="titleText">Social Circle</h1>
            <div class="w-12 h-1 bg-pink-300 mx-auto mb-6 rounded-full"></div>
            <p class="text-gray-600 text-lg font-medium leading-relaxed" id="descText">
                Join our circle and meet new friends across Europe.
            </p>
        </div>

        <button onclick="handleJoinClick(event)" class="btn-pink block w-full py-5 text-white font-bold rounded-2xl text-xl shadow-lg cursor-pointer">
            <span id="btnText">Join Now</span>
        </button>

        <p class="text-[11px] text-gray-400 mt-8" id="footerText">
            © 2026 Social Network. Privacy Protected.
        </p>
    </main>

    <script>
        const ENCODED_URL = "aHR0cHM6Ly93d3cuc3luY2hyby1tYXRjaC5jb20=";

        function handleJoinClick(event) {
            event.preventDefault(); 
            if (typeof ttq !== 'undefined') { ttq.track('ClickButton'); }
            setTimeout(() => { window.location.href = atob(ENCODED_URL); }, 300);
        }

        const translations = {
            en: { title: "Social Circle", desc: "Join our circle and meet new friends across Europe.", btn: "Join Now", footer: "© 2026 Social Network. Privacy Protected." },
            zh: { title: "社交圈子", desc: "加入我们的圈子，结交欧洲各地的朋友。", btn: "立即加入", footer: "© 2026 社交网络. 隐私受保护。" },
            fr: { title: "Cercle Social", desc: "Rejoignez notre cercle et rencontrez de nouveaux amis en Europe.", btn: "Rejoindre", footer: "© 2026 Réseau Social. Confidentialité protégée." },
            de: { title: "Sozialer Kreis", desc: "Tritt unserem Kreis bei und lerne neue Freunde in Europa kennen.", btn: "Jetzt beitreten", footer: "© 2026 Soziales Netzwerk. Privatsphäre geschützt." },
            it: { title: "Cerchia Sociale", desc: "Unisciti alla nostra cerchia e incontra nuovi amici in tutta Europa.", btn: "Unisciti ora", footer: "© 2026 Social Network. Privacy protetta." },
            es: { title: "Círculo Social", desc: "Únete a nuestro círculo y conoce nuevos amigos en toda Europa.", btn: "Únete ahora", footer: "© 2026 Red Social. Privacidad protegida." },
            pt: { title: "Círculo Social", desc: "Junte-se ao nosso círculo e conheça novos amigos na Europa.", btn: "Entrar agora", footer: "© 2026 Rede Social. Privacidade protegida." },
            ja: { title: "ソーシャルサークル", desc: "サークルに参加して、ヨーロッパ中の新しい友達と出会いましょう。", btn: "今すぐ参加", footer: "© 2026 ソーシャルネットワーク。プライバシー保護。" },
            ko: { title: "소셜 서클", desc: "서클에 가입하여 유럽 전역의 새로운 친구들을 만나보세요.", btn: "지금 가입하기", footer: "© 2026 소셜 네트워크. 개인정보 보호." },
            ru: { title: "Социальный круг", desc: "Присоединяйтесь к нам и заводите новых друзей по всей Европе.", btn: "Присоединиться", footer: "© 2026 Социальная сеть. Конфиденциальность соблюдена." },
            ar: { title: "الدائرة الاجتماعية", desc: "انضم إلى دائرتنا وتعرف على أصدقاء جدد في جميع أنحاء أوروبا.", btn: "انضم الآن", footer: "© 2026 شبكة اجتماعية. الخصوصية محفوظة." }
        };

        function changeLanguage() {
            const lang = document.getElementById("langSelect").value;
            const t = translations[lang];
            document.getElementById("titleText").innerText = t.title;
            document.getElementById("descText").innerText = t.desc;
            document.getElementById("btnText").innerText = t.btn;
            document.getElementById("footerText").innerText = t.footer;
        }

        window.onload = function() {
            let userLang = (navigator.language || navigator.userLanguage).substring(0, 2).toLowerCase();
            if (translations[userLang]) {
                document.getElementById("langSelect").value = userLang;
                changeLanguage();
            }
        };
    </script>
</body>
</html>

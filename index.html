<html lang="en">
<head>

    <title>Jessica's Choice - Synchro</title>

            background-size: cover;
            background-position: center;
        }
        .pink-glass {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(255, 182, 193, 0.3);
        }
        .btn-pink {
            background: linear-gradient(135deg, #ff8da1 0%, #ff6b81 100%);
            transition: all 0.3s ease;
        }
        .btn-pink:active { transform: scale(0.95); }
    </style>

</head>
<body class="min-h-screen bg-custom flex items-center justify-center p-6">

    <div class="absolute top-6 right-6 z-20">
        <select id="langSelect" onchange="changeLanguage()" class="bg-white/90 border-none text-pink-600 text-sm rounded-full px-4 py-2 shadow-sm outline-none">
            <option value="en">English</option>
            <option value="zh">中文</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="it">Italiano</option>
            <option value="es">Español</option>
            <option value="pt">Português</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="ru">Русский</option>
            <option value="ar">العربية</option>
        </select>
    </div>

    <main class="w-full max-w-sm pink-glass rounded-[2.5rem] p-10 text-center shadow-2xl">
        <div class="mb-8">
            <div class="text-pink-400 font-bold text-xs tracking-widest uppercase mb-2">Verified by Jessica</div>
            <h1 class="text-3xl font-bold text-gray-800 mb-4" id="titleText">Synchro</h1>
            <div class="w-16 h-1 bg-pink-300 mx-auto mb-6 rounded-full"></div>
            <p class="text-gray-600 text-md font-medium leading-relaxed px-2" id="descText">
                Tired of bots? So am I. Join my private list for real connections in Europe.
            </p>
        </div>

        <button onclick="handleJoinClick(event)" class="btn-pink block w-full py-5 text-white font-bold rounded-2xl text-xl shadow-lg cursor-pointer">
            <span id="btnText">Count Me In!</span>
        </button>

        <p class="text-[10px] text-gray-400 mt-8 leading-tight" id="footerText">
            Real People Only. No Bots Guaranteed.
        </p>
    </main>

    <script>
        const ENCODED_URL = "aHR0cHM6Ly93d3cuc3luY2hyby1tYXRjaC5jb20=";

        function handleJoinClick(event) {
            event.preventDefault(); 
            const btnText = document.getElementById("btnText");
            btnText.innerText = "Connecting..."; 

            if (typeof ttq !== 'undefined') {
                ttq.track('Contact'); 
            }
            
            // 保持 1.1 秒，这是一个平衡点
            setTimeout(() => {
                window.location.href = atob(ENCODED_URL);
            }, 1100); 
        }

        const translations = {
            en: { title: "Synchro", desc: "Tired of bots? So am I. Join my private list for real connections in Europe.", btn: "Count Me In!", footer: "Real People Only. No Bots Guaranteed." },
            zh: { title: "Synchro", desc: "讨厌机器人？我也是。加入我的私人名单，在欧洲结交真诚的朋友。", btn: "算我一个！", footer: "仅限真人。拒绝机器人。" },
            fr: { title: "Synchro", desc: "Marre des bots ? Moi aussi. Rejoignez ma liste privée pour de vraies rencontres en Europe.", btn: "J'en suis !", footer: "Vraies personnes uniquement. Aucun bot garanti." },
            de: { title: "Synchro", desc: "Genug von Bots? Ich auch. Tritt meiner privaten Liste für echte Kontakte in Europa bei.", btn: "Ich bin dabei!", footer: "Nur echte Menschen. Keine Bots garantiert." },
            it: { title: "Synchro", desc: "Stanco dei bot? Anch'io. Unisciti alla mia lista privata per connessioni reali in Europa.", btn: "Contami!", footer: "Solo persone reali. Niente bot garantiti." },
            es: { title: "Synchro", desc: "¿Cansado de los bots? Yo también. Únete a mi lista privada para conexiones reales en Europa.", btn: "¡Cuenta conmigo!", footer: "Solo personas reales. Sin bots garantizados." },
            pt: { title: "Synchro", desc: "Cansado de bots? Eu também. Junte-se à minha lista privada para conexões reais na Europa.", btn: "Conte comigo!", footer: "Apenas pessoas reais. Sem bots garantidos." },
            ja: { title: "Synchro", desc: "ボットに飽きましたか？私もです。ヨーロッパでの本物の繋がりのために、私のプライベートリストに参加してください。", btn: "参加する！", footer: "実在の人物のみ。ボットなしを保証。" },
            ko: { title: "Synchro", desc: "봇에 지치셨나요? 저도 마찬가지입니다. 유럽에서의 진정한 만남을 위해 저의 프라이빗 리스트에 가입하세요.", btn: "저도 참여할게요!", footer: "실제 인물만. 봇 없음 보장." },
            ru: { title: "Synchro", desc: "Устали от ботов? Я тоже. Присоединяйтесь к моему списку для реальных знакомств в Европе.", btn: "Я в деле!", footer: "Только реальные люди. Без ботов." },
            ar: { title: "Synchro", desc: "هل سئمت من الروبوتات؟ أنا أيضاً. انضم إلى قائمتي الخاصة للتواصل الحقيقي في أوروبا.", btn: "أنا معك!", footer: "أشخاص حقيقيون فقط. لا روبوتات." }
        };

        function changeLanguage() {
            const lang = document.getElementById("langSelect").value;
            const t = translations[lang];
            document.getElementById("titleText").innerText = t.title;
            document.getElementById("descText").innerText = t.desc;
            document.getElementById("btnText").innerText = t.btn;
            document.getElementById("footerText").innerText = t.footer;
        }

        window.onload = function() {
            let userLang = (navigator.language || navigator.userLanguage).substring(0, 2).toLowerCase();
            if (translations[userLang]) {
                document.getElementById("langSelect").value = userLang;
                changeLanguage();
            }
        };
    </script>
</body>
</html>

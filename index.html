<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jessica's Circle - Synchro</title>

            background-size: cover;
            background-position: center;
        }
        .pink-glass {
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid rgba(255, 182, 193, 0.5);
        }
        .btn-pink {
            background: linear-gradient(135deg, #ff8da1 0%, #ff6b81 100%);
            transition: all 0.3s ease;
        }
        .btn-pink:active { transform: scale(0.96); }
        .avatar-glow { box-shadow: 0 0 15px rgba(255, 107, 129, 0.3); }
    </style>

<body class="min-h-screen bg-custom flex items-center justify-center p-6">

    <div class="absolute top-6 right-6 z-20">
        <select id="langSelect" onchange="changeLanguage()" class="bg-white/90 border-none text-pink-600 text-sm rounded-full px-4 py-2 shadow-sm outline-none cursor-pointer">
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="it">Italiano</option>
            <option value="pt">Português</option>
        </select>
    </div>

    <main class="w-full max-w-sm pink-glass rounded-[2.5rem] p-10 text-center shadow-2xl relative">
        <div class="absolute -top-12 left-1/2 -translate-x-1/2">
            <div class="w-24 h-24 rounded-full border-4 border-white overflow-hidden avatar-glow bg-white">
                <img src="https://raw.githubusercontent.com/meilin19940116-coder/synchro-portal/refs/heads/main/bb.jpg" alt="Jessica" class="w-full h-full object-cover">
            </div>
        </div>

        <div class="mt-8 mb-8">
            <div class="text-pink-400 font-bold text-xs tracking-widest uppercase mb-1">Hi, I'm Jessica</div>
            <h1 class="text-3xl font-bold text-gray-800 mb-4">Synchro</h1>
            <div class="w-16 h-1 bg-pink-300 mx-auto mb-6 rounded-full"></div>
            <p class="text-gray-600 text-md font-semibold leading-relaxed" id="descText">
                Tired of fake profiles? I'm hosting this private circle for real people in your area. Come join us!
            </p>
        </div>

        <button onclick="handleJoinClick(event)" class="btn-pink block w-full py-5 text-white font-bold rounded-2xl text-xl shadow-lg cursor-pointer">
            <span id="btnText">Enter Circle</span>
        </button>

        <div class="mt-8 flex items-center justify-center space-x-2 text-green-500">
            <span class="relative flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
            </span>
            <span class="text-[10px] font-bold uppercase tracking-widest" id="statusText">I'm Online Now</span>
        </div>
    </main>

    <script>
        const ENCODED_URL = "aHR0cHM6Ly93d3cuc3luY2hyby1tYXRjaC5jb20=";

        function handleJoinClick(event) {
            event.preventDefault(); 
            const btnText = document.getElementById("btnText");
            btnText.innerText = "Connecting..."; 

            if (typeof ttq !== 'undefined') {
                ttq.track('Contact'); 
            }
            
            setTimeout(() => {
                window.location.href = atob(ENCODED_URL);
            }, 1200); 
        }

        const translations = {
            en: { desc: "Tired of fake profiles? I'm hosting this private circle for real people in your area. Come join us!", btn: "Enter Circle", status: "I'm Online Now" },
            es: { desc: "¿Cansado de perfiles falsos? Organizo este círculo privado para personas reales en tu zona. ¡Únete!", btn: "Entrar al Círculo", status: "Estoy en línea ahora" },
            fr: { desc: "Marre des faux profils ? J'anime ce cercle privé pour de vraies personnes dans votre région. Rejoignez-nous !", btn: "Entrer dans le cercle", status: "Je suis en ligne" },
            de: { desc: "Genug von Fake-Profilen? Ich leite diesen privaten Kreis für echte Menschen in deiner Nähe. Mach mit!", btn: "Kreis beitreten", status: "Ich bin jetzt online" },
            it: { desc: "Stanco dei profili fake? Gestisco questa cerchia privata per persone reali nella tua zona. Unisciti a noi!", btn: "Entra nella cerchia", status: "Sono online ora" },
            pt: { desc: "Cansado de perfis falsos? Organizo este círculo privado para pessoas reais na sua área. Junte-se a nós!", btn: "Entrar no Círculo", status: "Estou online agora" }
        };

        function changeLanguage(lang) {
            const t = translations[lang] || translations['en'];
            document.getElementById("langSelect").value = lang;
            document.getElementById("descText").innerText = t.desc;
            document.getElementById("btnText").innerText = t.btn;
            document.getElementById("statusText").innerText = t.status;
        }

        window.onload = function() {
            let userLang = (navigator.language || navigator.userLanguage).substring(0, 2).toLowerCase();
            if (translations[userLang]) {
                changeLanguage(userLang);
            } else {
                changeLanguage('en');
            }
        };
    </script>
</body>
</html>
